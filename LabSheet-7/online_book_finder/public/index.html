<!DOCTYPE html>
<html>

<head>
<title>Online Book Finder</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Online Book Finder</h1>

<input type="text" id="searchTitle" placeholder="Search by title">
<button onclick="searchBooks()">Search</button>

<br><br>

<select id="category">
<option value="">Select Category</option>
<option value="Programming">Programming</option>
<option value="Database">Database</option>
<option value="AI">AI</option>
</select>

<button onclick="filterCategory()">Filter</button>

<br><br>

<button onclick="sortPrice()">Sort by Price</button>
<button onclick="sortRating()">Sort by Rating</button>
<button onclick="topBooks()">Top Rated</button>

<hr>

<div id="books"></div>

<button onclick="loadMore()">Load More</button>

<script src="script.js"></script>

</body>
</html>
